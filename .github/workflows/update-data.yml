name: Update public dynamics data

on:
  push:
    branches: [main]
    paths:
      - "frontend/public/data/snapshot.json"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Publish snapshot collected by the local computer
        run: |
          mkdir -p public-data/data
          cp frontend/public/data/snapshot.json public-data/data/snapshot.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public-data
      - name: Deploy data to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
