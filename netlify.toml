[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)public/data/snapshot.json'"

[build.environment]
  VITE_STATIC_DATA_URL = "https://xxdxmz.github.io/rhythm-calendar/data/snapshot.json"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
